<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Giphy Search</title>
</head>
<body>

    <h1>Search GIFs</h1>

    <!-- Form -->
    <form id="gif-form">
        <input type="text" id="search-input" placeholder="Enter category (e.g. sun)" required>
        <button type="submit">Search</button>
    </form>

    <!-- Delete All Button -->
    <button id="delete-all">DELETE ALL</button>

    <!-- GIF Container -->
    <div id="gif-container"></div>

    <script src="script.js"></script>
</body>
</html>
