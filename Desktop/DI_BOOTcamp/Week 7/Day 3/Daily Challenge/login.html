<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <nav>
      <a href="/register.html">Don't have an account? Register here</a>
    </nav>
    <div class="login-info">
      <p><strong>Existing user:</strong> Username: <code>Ochibo</code></p>
      <p><small>Use the password you entered during registration</small></p>
    </div>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit" id="submitBtn" disabled>Login</button>
    </form>
    <p id="message"></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    form.addEventListener('input', () => {
      const inputs = [...form.elements].filter(el => el.tagName === 'INPUT');
      const allFilled = inputs.every(el => el.value.trim() !== '');
      submitBtn.disabled = !allFilled;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const loginData = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      };

      console.log('Attempting login with:', { username: loginData.username, passwordLength: loginData.password.length });

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(loginData)
        });

        console.log('Response status:', res.status);
        const data = await res.json();
        console.log('Response data:', data);

        message.style.color = res.ok ? 'green' : 'red';
        message.textContent = data.message;

        if (res.ok) {
          // Optional: redirect to dashboard or show user info
          setTimeout(() => {
            message.textContent += ` Welcome, ${data.user.firstName}!`;
          }, 1000);
        }
      } catch (error) {
        console.error('Login error:', error);
        message.style.color = 'red';
        message.textContent = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
