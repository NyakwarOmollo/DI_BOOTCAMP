<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Guess Master 🎯</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎭 Emoji Guess Master</h1>
    <div id="score">Score: <span id="score-value">0</span></div>

    <div class="game-area">
      <div id="emoji" class="emoji-display"></div>
      
      <div id="options" class="options"></div>
      
      <div id="feedback" class="feedback"></div>
    </div>

    <button id="next-btn" class="next-btn">Next Emoji →</button>

    <div class="leaderboard">
      <h2>🏆 Leaderboard</h2>
      <ol id="leaderboard-list"></ol>
    </div>

    <div class="name-input">
      <input type="text" id="player-name" placeholder="Enter your name to save score">
      <button id="save-score-btn">Save Score</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
