<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloring Squares</title>
    <link rel="stylesheet" href="coloring.css">
</head>
<body>

    <h1>🎨 Coloring Squares</h1>

    <div class="controls">
        <button id="clearBtn">Clear Grid</button>
        <button id="eraserBtn">Eraser</button>
    </div>

    <script src="coloring.js"></script>

</body>
</html>
